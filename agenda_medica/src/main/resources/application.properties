spring.application.name=agenda-medica
server.port=3004

spring.datasource.url=jdbc:mysql://localhost:3306/agenda_medica
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
##no necesita la linea siguiente ya que Hibernate detecte MySQL solo
##Se configuró explícitamente el dialecto MySQL para asegurar la compatibilidad de Hibernate con el motor de base de datos utilizado
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true

logging.file.name=logs/microservicio-agenda.log
spring.application.name=evaluacion_atencion
server.port=3009

spring.datasource.url=jdbc:mysql://localhost:3306/evaluacion_atencion
spring.datasource.username=root
spring.datasource.password=

###update se cambia a validate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true

logging.file.name=logs/microservicio-evaluacion-atencion.log

springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/doc/api-docs
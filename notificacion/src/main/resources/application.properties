spring.application.name=notificacion
server.port=3005

spring.datasource.url=jdbc:mysql://localhost:3306/notificacion
spring.datasource.username=root
spring.datasource.password=

###update se cambia a validate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true

logging.file.name=logs/microservicio-notificacion.log

springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/doc/api-docs

eureka.client.service-url.defaultZone=http://localhost:8761/eureka